[package]
name = "eldritch-libassets"
version = "0.4.0"
edition = "2024"

[dependencies]
eldritch-core = { workspace = true }
eldritch-macros = { workspace = true }
eldritch-agent = { workspace = true, optional = true }
pb = { workspace = true, optional = true }
anyhow = { version = "1.0" }
rust-embed = { version = "8.0" }
log = { workspace = true }

[features]
verbose-logging = ["eldritch-core/verbose-logging", "eldritch-macros/verbose-logging", "eldritch-agent/verbose-logging", "pb/verbose-logging", "eldritch-mockagent/verbose-logging"]
default = ["std", "stdlib"]
std = ["eldritch-core/std"]
fake_bindings = []
stdlib = ["dep:eldritch-agent", "dep:pb"]

[dev-dependencies]
eldritch-mockagent = { path = "../../testutils/eldritch-mockagent" }
tempfile = "3.3"
