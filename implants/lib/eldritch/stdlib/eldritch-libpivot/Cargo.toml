[package]
name = "eldritch-libpivot"
version = "0.4.0"
edition = "2024"

[dependencies]
eldritch-core = { workspace = true }
eldritch-macros = { workspace = true }
eldritch-agent = { workspace = true, optional = true }

anyhow = { workspace = true, optional = true }
async-recursion = { workspace = true, optional = true }
async-trait = { workspace = true, optional = true }
ipnetwork = { workspace = true, optional = true }
log = { workspace = true, optional = true }
russh = { workspace = true, optional = true }
russh-sftp = { workspace = true, optional = true }
russh-keys = { workspace = true, optional = true }
tokio = { workspace = true, features = [
    "macros",
    "rt-multi-thread",
    "fs",
], optional = true }
pnet = { workspace = true, optional = true }
pb = { workspace = true, optional = true }

[target.'cfg(not(target_os = "freebsd"))'.dependencies]
listeners = { workspace = true, optional = true }

[dev-dependencies]
eldritch-mockagent = { path = "../../testutils/eldritch-mockagent" }
tempfile = { workspace = true }
eldritch-agent = { workspace = true }

[features]
verbose-logging = ["eldritch-core/verbose-logging", "eldritch-macros/verbose-logging", "eldritch-agent/verbose-logging", "pb/verbose-logging", "eldritch-mockagent/verbose-logging", "eldritch-agent/verbose-logging"]
default = ["stdlib"]
stdlib = [
    "dep:eldritch-agent",
    "dep:pb",
    "anyhow",
    "async-recursion",
    "async-trait",
    "ipnetwork",
    "log",
    "russh",
    "russh-sftp",
    "russh-keys",
    "tokio",
    "pnet",
]
fake_bindings = []
