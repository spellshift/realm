[package]
name = "eldritch-libprocess"
version = "0.4.0"
edition = "2024"

[dependencies]
eldritch-core = { workspace = true }
eldritch-macros = { workspace = true }
sysinfo = { workspace = true, optional = true }
spin = { version = "0.10.0", features = ["mutex", "spin_mutex"] }
netstat = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[features]
verbose-logging = ["eldritch-core/verbose-logging", "eldritch-macros/verbose-logging", "netstat/verbose-logging"]
default = ["stdlib"]
stdlib = ["dep:sysinfo"]
fake_bindings = []

[dev-dependencies]
anyhow = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros", "net", "io-util"] }
