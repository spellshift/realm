[package]
name = "eldritch-libregex"
version = "0.4.0"
edition = "2024"

[dependencies]
eldritch-core = { workspace = true }
eldritch-macros = { workspace = true }
regex = { workspace = true, optional = true }

[features]
verbose-logging = ["eldritch-core/verbose-logging", "eldritch-macros/verbose-logging"]
default = ["stdlib"]
stdlib = ["dep:regex"]
fake_bindings = []
